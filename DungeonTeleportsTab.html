<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DungeonTeleportsTab - Mentiuszen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { dark: '#0f172a', card: '#1e293b' } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-slate-300 font-sans antialiased selection:bg-fuchsia-500 selection:text-white pt-16">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-dark/80 backdrop-blur-md border-b border-slate-800 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex-shrink-0 font-bold text-xl text-white">
                    <span class="text-indigo-400">Mentiuszen</span>.<span class="text-slate-500">hub</span>
                </a>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html" class="text-gray-300 hover:text-white hover:bg-slate-800 px-3 py-2 rounded-md text-sm font-medium transition-colors" data-i18n="navHome">Home</a>
                        <a href="projects.html" class="text-gray-300 hover:text-white hover:bg-slate-800 px-3 py-2 rounded-md text-sm font-medium transition-colors" data-i18n="navProjects">Projects</a>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="changeLanguage('en')" id="btn-en" class="text-sm font-medium text-white bg-indigo-600/50 hover:bg-indigo-600 px-2 py-1 rounded transition-colors">EN</button>
                    <button onclick="changeLanguage('pl')" id="btn-pl" class="text-sm font-medium text-slate-400 hover:text-white px-2 py-1 rounded transition-colors">PL</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Fuchsia Project Header -->
    <header class="relative overflow-hidden py-16 border-b border-fuchsia-900/30">
        <div class="absolute inset-0 -z-10 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-fuchsia-900/20 via-dark to-dark"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center gap-8">
            <div class="p-6 rounded-2xl bg-fuchsia-500/10 border border-fuchsia-500/20 text-fuchsia-400">
                <i class="fa-solid fa-dungeon text-6xl"></i>
            </div>
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-extrabold text-white mb-2">DungeonTeleportsTab</h1>
                <p class="text-xl text-fuchsia-100/60 mb-6" data-i18n="dttDesc">A tab interface for quick and easy dungeon teleports.</p>
                <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                    <a href="https://github.com/mentiuszen/DungeonTeleportsTab/releases/latest" target="_blank" class="bg-fuchsia-600 hover:bg-fuchsia-500 text-white py-2 px-6 rounded-lg font-bold transition-colors flex items-center shadow-lg shadow-fuchsia-600/20">
                        <i class="fa-solid fa-download mr-2"></i> <span data-i18n="download">Download Latest</span>
                    </a>
                    <a href="https://github.com/mentiuszen/DungeonTeleportsTab" target="_blank" class="bg-slate-800 hover:bg-slate-700 text-white py-2 px-6 rounded-lg font-medium transition-colors border border-slate-700 flex items-center">
                        <i class="fa-brands fa-github mr-2"></i> Source Code
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <section>
            <h2 class="text-2xl font-bold text-white mb-8 border-b border-slate-800 pb-2 flex items-center">
                <i class="fa-solid fa-timeline mr-3 text-fuchsia-400"></i> <span data-i18n="changelog">Changelog</span>
            </h2>
            
            <div class="space-y-6">
                <!-- Example Update -->
                <div class="bg-card p-6 rounded-xl border border-slate-800 border-l-4 border-l-fuchsia-500">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold text-white">v2.0.0</h3>
                        <span class="text-sm text-slate-500">Latest</span>
                    </div>
                    <ul class="list-disc list-inside space-y-2 text-slate-400">
                        <li><span class="text-emerald-400 font-semibold" data-i18n="tagAdded">[Added]</span> Support for new dungeon maps.</li>
                        <li><span class="text-red-400 font-semibold" data-i18n="tagFixed">[Fixed]</span> Crash when teleporting to restricted areas.</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
